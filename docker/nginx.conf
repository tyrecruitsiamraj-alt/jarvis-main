server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Gzip สำหรับ text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        image/svg+xml;

    # Proxy ทุก /api/* → Node.js API server (port 3000 ภายใน container)
    location /api {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Cache static assets นาน 1 ปี (Vite เพิ่ม hash ใน filename อยู่แล้ว)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — ส่ง index.html สำหรับทุก route ที่ไม่ใช่ไฟล์จริง
    location / {
        try_files $uri $uri/ /index.html;
    }
}
