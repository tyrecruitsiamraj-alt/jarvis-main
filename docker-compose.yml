version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # VITE_ vars อบลงใน bundle ตอน build — อ่านค่าจาก .env หรือกำหนดตรงนี้
        VITE_DEV_ROLE_ENTRY: ${VITE_DEV_ROLE_ENTRY:-false}
    image: jarvis-app:latest
    container_name: jarvis-app
    ports:
      - "${APP_PORT:-9000}:80"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"          # internal API port (nginx proxies /api → 3000)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
