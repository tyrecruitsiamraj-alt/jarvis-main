name: Deploy to Linux Server

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  command_timeout: 90m
                  script: |
                      set -euo pipefail
                      cd jarvis-main
                      git pull https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_PASSWORD }}@github.com/tyrecruitsiamraj-alt/jarvis-main.git main
                      chmod +x scripts/sync-env.sh
                      ./scripts/sync-env.sh .env POSTMARK_SERVER_TOKEN "${{ secrets.POSTMARK_SERVER_TOKEN }}"
                      ./scripts/sync-env.sh .env EMAIL_SENDER "${{ secrets.EMAIL_SENDER }}"
                      ./scripts/sync-env.sh .env APP_PUBLIC_URL "https://jarvis.siamrajathanee.dev"
                      ./scripts/sync-env.sh .env AZURE_AD_TENANT_ID "${{ secrets.AZURE_AD_TENANT_ID }}"
                      ./scripts/sync-env.sh .env AZURE_AD_CLIENT_ID "${{ secrets.AZURE_AD_CLIENT_ID }}"
                      ./scripts/sync-env.sh .env AZURE_AD_CLIENT_SECRET "${{ secrets.AZURE_AD_CLIENT_SECRET }}"
                      ./scripts/sync-env.sh .env AUTH_TOKEN_TTL_SECONDS "${{ secrets.AUTH_TOKEN_TTL_SECONDS }}"
                      ./scripts/sync-env.sh .env AUTH_COOKIE_SECURE "true"
                      ./scripts/sync-env.sh .env VITE_DEV_ROLE_ENTRY "false"
                      ./scripts/sync-env.sh .env JARVIS_DEV_ROLE_LOGIN "false"
                      ./scripts/sync-env.sh .env CORS_ALLOWED_ORIGINS "https://jarvis.siamrajathanee.dev,https://jarvis-main-tyteam.vercel.app,http://localhost:5173"
                      ./scripts/sync-env.sh .env IRECRUIT_DB_HOST "${{ secrets.IRECRUIT_DB_HOST }}"
                      ./scripts/sync-env.sh .env IRECRUIT_DB_PORT "${{ secrets.IRECRUIT_DB_PORT }}"
                      ./scripts/sync-env.sh .env IRECRUIT_DB_USER "${{ secrets.IRECRUIT_DB_USER }}"
                      ./scripts/sync-env.sh .env IRECRUIT_DB_PASSWORD "${{ secrets.IRECRUIT_DB_PASSWORD }}"
                      ./scripts/sync-env.sh .env IRECRUIT_DB_NAME "${{ secrets.IRECRUIT_DB_NAME }}"
                      ./scripts/sync-env.sh .env RECRUIT_REGISTER_OWNER "${{ secrets.RECRUIT_REGISTER_OWNER }}"
                      docker compose up -d --build
                      docker compose exec -T app npm run db:migrate
                      docker compose exec -T app npx tsx -e "import { apiRoutes } from './api/_handlers/registry.ts'; if (!apiRoutes['/api/matching/suggestions']) throw new Error('matching route missing'); console.log('api registry ok');"
